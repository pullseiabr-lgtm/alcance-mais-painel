<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alcance+ | Gestão de Agência</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --al:#00C4B4;--al2:#00E5D2;--bk:#0D0F14;--bk2:#13161E;--bk3:#1A1D28;
  --bk4:#22263A;--bk5:#2C3150;--gr3:#8892B0;--lgt:#CCD6F6;--wh:#fff;
  --ok:#22C55E;--wr:#F59E0B;--er:#EF4444;--bl:#3B82F6;--pu:#8B5CF6;
  --r:8px;--r2:12px;--r3:16px;--tr:all .18s ease;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bk);color:var(--lgt);display:flex;min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit}
input,select,textarea{font-family:inherit}

/* SIDEBAR */
.sb{width:240px;min-height:100vh;background:var(--bk2);border-right:1px solid var(--bk4);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--bk4);display:flex;align-items:center;gap:10px}
.logo-box{width:36px;height:36px;background:var(--al);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#000;flex-shrink:0}
.logo-txt{font-size:17px;font-weight:700;color:var(--wh)}
.logo-txt span{color:var(--al)}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0}
.sb-sec{margin-bottom:4px}
.sb-sec-label{font-size:10px;font-weight:700;color:var(--gr3);text-transform:uppercase;letter-spacing:.08em;padding:8px 16px 4px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;border-radius:0;cursor:pointer;color:var(--gr3);font-size:13.5px;font-weight:500;transition:var(--tr);border-left:3px solid transparent;position:relative}
.ni:hover{color:var(--lgt);background:var(--bk3)}
.ni.act{color:var(--al);background:rgba(0,196,180,.08);border-left-color:var(--al)}
.ni svg{width:17px;height:17px;flex-shrink:0}
.sb-footer{padding:14px 16px;border-top:1px solid var(--bk4)}
.sb-user{display:flex;align-items:center;gap:10px}
.ava{width:32px;height:32px;border-radius:50%;background:var(--bk5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--al);flex-shrink:0}

/* MAIN */
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bk2);border-bottom:1px solid var(--bk4);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:17px;font-weight:700;color:var(--wh)}
.topbar-right{display:flex;align-items:center;gap:10px}
.content{padding:24px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;transition:var(--tr)}
.btn-al{background:var(--al);color:#000}
.btn-al:hover{background:var(--al2)}
.btn-ghost{background:transparent;color:var(--gr3);border:1px solid var(--bk4)}
.btn-ghost:hover{color:var(--lgt);border-color:var(--bk5)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-er{background:var(--er);color:#fff}

/* CARDS */
.card{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r2);padding:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-hd h3{font-size:14px;font-weight:600;color:var(--wh)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.kpi{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r2);padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--al)}
.kpi-label{font-size:11px;font-weight:600;color:var(--gr3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:26px;font-weight:800;color:var(--wh);line-height:1}
.kpi-sub{font-size:11px;color:var(--gr3);margin-top:6px}
.kpi-ok::before{background:var(--ok)}
.kpi-wr::before{background:var(--wr)}
.kpi-er::before{background:var(--er)}
.kpi-bl::before{background:var(--bl)}
.kpi-pu::before{background:var(--pu)}

/* GRID LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g-col{display:flex;flex-direction:column;gap:16px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--gr3);text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--bk4)}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(34,38,58,.6);font-size:13px;color:var(--lgt);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bk4)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}
.badge-al{background:rgba(0,196,180,.15);color:var(--al)}
.badge-ok{background:rgba(34,197,94,.15);color:var(--ok)}
.badge-wr{background:rgba(245,158,11,.15);color:var(--wr)}
.badge-er{background:rgba(239,68,68,.15);color:var(--er)}
.badge-bl{background:rgba(59,130,246,.15);color:var(--bl)}
.badge-pu{background:rgba(139,92,246,.15);color:var(--pu)}
.badge-gr{background:rgba(136,146,176,.12);color:var(--gr3)}

/* PROGRESS */
.prog-wrap{display:flex;flex-direction:column;gap:12px}
.prog-item{}
.prog-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px}
.prog-bar{height:6px;background:var(--bk5);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--al);transition:width .6s ease}
.prog-fill.ok{background:var(--ok)}
.prog-fill.wr{background:var(--wr)}
.prog-fill.er{background:var(--er)}
.prog-fill.bl{background:var(--bl)}
.prog-fill.pu{background:var(--pu)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r3);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--bk4)}
.modal-hd h3{font-size:16px;font-weight:700;color:var(--wh)}
.modal-body{padding:22px}
.modal-ft{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--bk4)}
.close-btn{background:none;color:var(--gr3);font-size:20px;line-height:1;padding:2px 6px;border-radius:4px}
.close-btn:hover{color:var(--lgt);background:var(--bk4)}

/* FORM */
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gr3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.inp{width:100%;background:var(--bk4);border:1px solid var(--bk5);border-radius:var(--r);padding:9px 12px;color:var(--lgt);font-size:13px;transition:var(--tr);outline:none}
.inp:focus{border-color:var(--al);background:var(--bk2)}
.inp::placeholder{color:var(--bk5)}
select.inp option{background:var(--bk3)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* KANBAN */
.k-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.k-col{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r2);min-width:230px;flex:1;display:flex;flex-direction:column}
.k-col-hd{padding:14px 14px 10px;border-bottom:1px solid var(--bk4);display:flex;align-items:center;justify-content:space-between}
.k-col-hd span{font-size:12px;font-weight:700;color:var(--gr3);text-transform:uppercase;letter-spacing:.06em}
.k-col-cnt{padding:0 8px 8px;font-size:11px;background:var(--bk5);border-radius:12px;color:var(--lgt);font-weight:700}
.k-cards{padding:10px 10px;display:flex;flex-direction:column;gap:8px;flex:1}
.k-card{background:var(--bk4);border:1px solid var(--bk5);border-radius:var(--r);padding:12px;cursor:pointer;transition:var(--tr)}
.k-card:hover{border-color:var(--al);background:var(--bk5)}
.k-card-title{font-size:13px;font-weight:600;color:var(--wh);margin-bottom:6px}
.k-card-sub{font-size:11px;color:var(--gr3)}
.k-card-ft{display:flex;align-items:center;justify-content:space-between;margin-top:8px}

/* TABS */
.tabs{display:flex;gap:4px;padding:4px;background:var(--bk4);border-radius:var(--r);width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;color:var(--gr3);cursor:pointer;transition:var(--tr)}
.tab.act{background:var(--bk3);color:var(--wh)}
.tab:hover:not(.act){color:var(--lgt)}

/* TEAM CARDS */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.team-card{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r2);padding:20px;text-align:center;transition:var(--tr)}
.team-card:hover{border-color:var(--bk5)}
.team-ava{width:60px;height:60px;border-radius:50%;background:var(--bk5);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--al);margin:0 auto 12px}
.team-name{font-size:15px;font-weight:700;color:var(--wh);margin-bottom:3px}
.team-role{font-size:12px;color:var(--gr3);margin-bottom:10px}
.team-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:10px}
.team-stat{font-size:11px;color:var(--gr3)}

/* PROPOSAL CARDS */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.prop-card{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r2);padding:18px;transition:var(--tr)}
.prop-card:hover{border-color:var(--bk5)}
.prop-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.prop-client{font-size:15px;font-weight:700;color:var(--wh)}
.prop-date{font-size:11px;color:var(--gr3)}
.prop-val{font-size:22px;font-weight:800;color:var(--al);margin-bottom:4px}
.prop-desc{font-size:12px;color:var(--gr3);margin-bottom:12px}
.prop-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.prop-ft{display:flex;align-items:center;justify-content:space-between}

/* CALENDAR POSTS */
.cal-day{margin-bottom:20px}
.cal-day-label{font-size:12px;font-weight:700;color:var(--gr3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bk4)}
.cal-posts{display:flex;flex-direction:column;gap:8px}
.cal-post{background:var(--bk3);border:1px solid var(--bk4);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:12px}
.cal-post-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-post-info{flex:1}
.cal-post-title{font-size:13px;font-weight:600;color:var(--wh)}
.cal-post-meta{font-size:11px;color:var(--gr3);margin-top:2px}

/* FILTERS */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bk4);color:var(--gr3);cursor:pointer;transition:var(--tr);border:1px solid var(--bk5)}
.filter-btn.act{background:rgba(0,196,180,.15);color:var(--al);border-color:rgba(0,196,180,.3)}
.filter-btn:hover:not(.act){color:var(--lgt)}

/* ACTIVITY */
.act-list{display:flex;flex-direction:column;gap:2px}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(34,38,58,.5)}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--al);flex-shrink:0;margin-top:4px}
.act-txt{flex:1;font-size:13px;color:var(--lgt)}
.act-time{font-size:11px;color:var(--gr3);flex-shrink:0;margin-top:2px}

/* SCROLL */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bk2)}
::-webkit-scrollbar-thumb{background:var(--bk5);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bk4)}

/* UTILS */
.flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:14px}.mb-4{margin-bottom:20px}
.text-wh{color:var(--wh)}.text-gr{color:var(--gr3)}.text-al{color:var(--al)}.text-ok{color:var(--ok)}.text-er{color:var(--er)}.text-wr{color:var(--wr)}
.fw-7{font-weight:700}.fw-6{font-weight:600}.fs-12{font-size:12px}.fs-13{font-size:13px}.fs-11{font-size:11px}
.mt-3{margin-top:12px}.w-full{width:100%}
.sep{height:1px;background:var(--bk4);margin:16px 0}
.empty{text-align:center;padding:40px;color:var(--gr3);font-size:13px}
.tag-input{display:flex;gap:6px}
</style>
</head>

function go(page) {
  currentPage = page;
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('act'));
  document.querySelectorAll('.ni').forEach(n => {
    if(n.getAttribute('onclick') && n.getAttribute('onclick').includes(`'${page}'`)) n.classList.add('act');
  });
  render();
}

function render() {
  const titles = {
    dashboard:'Dashboard',clientes:'Clientes',projetos:'Projetos',campanhas:'Campanhas',
    financeiro:'Financeiro',equipe:'Equipe',pipeline:'Pipeline',calendario:'Calendário',
    relatorios:'Relatórios',propostas:'Propostas'
  };
  const btnLabels = {
    clientes:'Novo Cliente',projetos:'Novo Projeto',campanhas:'Nova Campanha',
    financeiro:'Nova Transação',equipe:'Novo Membro',pipeline:'Novo Lead',
    calendario:'Novo Post',relatorios:'Novo Relatório',propostas:'Nova Proposta'
  };
  document.getElementById('page-title').textContent = titles[currentPage] || currentPage;
  const tr = document.getElementById('topbar-right');
  if(currentPage !== 'dashboard') {
    tr.innerHTML = `<button class="btn btn-al" onclick="openModal('${currentPage}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>${btnLabels[currentPage]||'Novo'}</button>`;
  } else {
    tr.innerHTML = `<span class="fs-12 text-gr">Hoje, 13 Mai 2026</span>`;
  }
  const pages = {
    dashboard: renderDashboard,
    clientes: renderClientes,
    projetos: renderProjetos,
    campanhas: renderCampanhas,
    financeiro: renderFinanceiro,
    equipe: renderEquipe,
    pipeline: renderPipeline,
    calendario: renderCalendario,
    relatorios: renderRelatorios,
    propostas: renderPropostas,
  };
  document.getElementById('content').innerHTML = (pages[currentPage] || (() => '<div class="empty">Em breve</div>'))();
  bindEvents();
}

          </tr>`).join('')}

      </table>
    </div>
  </div>` : `
  <div class="k-board">
    ${cols.map(col=>{
      const cards = D.projetos.filter(p=>p.status===col);
      return `<div class="k-col">

  const filtered = campFiltro==='Todos' ? D.campanhas : D.campanhas.filter(c=>c.status===campFiltro);
  return `
  <div class="filter-bar">
    ${filtros.map(f=>`<div class="filter-btn ${campFiltro===f?'act':''}" onclick="setCampFiltro('${f}')">${f}</div>`).join('')}
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Campanha</th><th>Canal</th><th>Orçamento</th><th>Gasto</th><th>CTR</th><th>CPA</th><th>Leads</th><th>Status</th></tr></thead>
        <tbody>
          ${filtered.map(c=>`<tr>
            <td>
              <div class="text-wh fw-6">${c.nome}</div>
              <div class="fs-11 text-gr">${c.cliente}</div>
            </td>
            <td>${canalBadge(c.canal)}</td>
            <td>
              <div class="fs-12">R$ ${c.orcamento.toLocaleString('pt-BR')}</div>
              <div class="prog-bar" style="margin-top:4px;width:80px"><div class="prog-fill ${c.gasto/c.orcamento>0.9?'er':c.gasto/c.orcamento>0.7?'wr':'ok'}" style="width:${Math.round(c.gasto/c.orcamento*100)}%"></div></div>
            </td>
            <td class="${c.gasto/c.orcamento>0.9?'text-er':'text-wr'}">R$ ${c.gasto.toLocaleString('pt-BR')}</td>
            <td>${c.ctr!==null?c.ctr+'%':'—'}</td>
            <td>${c.cpa!==null?'R$ '+c.cpa:'—'}</td>
            <td class="text-al fw-6">${c.leads}</td>
            <td>${statusCamp(c.status)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function setCampFiltro(f) { campFiltro = f; render(); }

// ============================================================
// FINANCEIRO
// ============================================================
function renderFinanceiro() {
  const rec = D.financeiro.filter(t=>t.tipo==='receita').reduce((a,b)=>a+b.valor,0);
  const des = D.financeiro.filter(t=>t.tipo==='despesa').reduce((a,b)=>a+b.valor,0);
  const margem = Math.round((rec-des)/rec*100);
  return `
  <div class="kpi-grid mb-4">
    <div class="kpi kpi-ok"><div class="kpi-label">Receita Total</div><div class="kpi-val">R$ ${rec.toLocaleString('pt-BR')}</div><div class="kpi-sub">${D.financeiro.filter(t=>t.tipo==='receita').length} transações</div></div>
    <div class="kpi kpi-er"><div class="kpi-label">Despesas</div><div class="kpi-val">R$ ${des.toLocaleString('pt-BR')}</div><div class="kpi-sub">${D.financeiro.filter(t=>t.tipo==='despesa').length} transações</div></div>
    <div class="kpi kpi-al"><div class="kpi-label">Lucro Líquido</div><div class="kpi-val">R$ ${(rec-des).toLocaleString('pt-BR')}</div><div class="kpi-sub">Saldo do período</div></div>
    <div class="kpi kpi-bl"><div class="kpi-label">Margem Líquida</div><div class="kpi-val">${margem}%</div><div class="kpi-sub">Meta: 60%</div></div>
  </div>
  <div class="card">
    <div class="card-hd"><h3>Transações — Maio 2026</h3></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Cliente</th><th>Valor</th></tr></thead>
        <tbody>
          ${D.financeiro.sort((a,b)=>b.data.localeCompare(a.data)).map(t=>`<tr>
            <td class="fs-12 text-gr">${fmtDate(t.data)}</td>
            <td class="text-wh fw-6">${t.descricao}</td>
            <td><span class="badge badge-gr">${t.categoria}</span></td>
            <td class="text-gr fs-12">${t.cliente||'—'}</td>
            <td class="${t.tipo==='receita'?'text-ok':'text-er'} fw-7">${t.tipo==='receita'?'+':'-'} R$ ${t.valor.toLocaleString('pt-BR')}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

// ============================================================
// PIPELINE
// ============================================================
function renderPipeline() {
  const etapas = ['Prospecção','Qualificação','Proposta','Negociação','Fechado'];
  const etapaColors = {Prospecção:'var(--gr3)',Qualificação:'var(--bl)',Proposta:'var(--pu)',Negociação:'var(--wr)',Fechado:'var(--ok)'};
  return `
  <div class="kpi-grid mb-4">
    ${etapas.map(e=>{
      const leads = D.pipeline.filter(p=>p.etapa===e);
      const valor = leads.reduce((a,b)=>a+b.valor,0);
      return `<div class="kpi"><div class="kpi-label">${e}</div><div class="kpi-val">${leads.length}</div><div class="kpi-sub">R$ ${valor.toLocaleString('pt-BR')}</div></div>`;
    }).join('')}
  </div>
  <div class="k-board">
    ${etapas.map(etapa=>{
      const cards = D.pipeline.filter(p=>p.etapa===etapa);
      return `<div class="k-col">
        <div class="k-col-hd">
          <span style="color:${etapaColors[etapa]}">${etapa}</span>
          <div class="k-col-cnt">${cards.length}</div>
        </div>
        <div class="k-cards">
          ${cards.map(p=>`<div class="k-card">
            <div class="k-card-title">${p.empresa}</div>
            <div class="k-card-sub">${p.contato}</div>
            <div class="k-card-ft">
              <span class="text-al fw-7" style="font-size:13px">R$ ${p.valor.toLocaleString('pt-BR')}</span>
              <span class="badge badge-gr">${p.probabilidade}%</span>
            </div>
            <div class="fs-11 text-gr" style="margin-top:6px">Últ. contato: ${fmtDate(p.dataUlt)}</div>
          </div>`).join('')}
          ${cards.length===0?'<div class="empty" style="padding:20px">Vazio</div>':''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// CALENDÁRIO
// ============================================================
function renderCalendario() {
  const dias = [...new Set(D.calendario.map(p=>p.data))].sort();
  const canalColor = {Instagram:'var(--pu)',LinkedIn:'var(--bl)',TikTok:'var(--er)',Blog:'var(--wr)',Email:'var(--al)'};
  const statusCal = {Agendado:'badge-ok',Rascunho:'badge-gr',Revisão:'badge-wr'};
  return `
  <div class="grid-2">
    <div>
      ${dias.map(dia=>`
      <div class="cal-day mb-4">
        <div class="cal-day-label">${fmtDateFull(dia)}</div>
        <div class="cal-posts">
          ${D.calendario.filter(p=>p.data===dia).map(p=>`<div class="cal-post">
            <div class="cal-post-dot" style="background:${canalColor[p.canal]||'var(--gr3)'}"></div>
            <div class="cal-post-info">
              <div class="cal-post-title">${p.titulo}</div>
              <div class="cal-post-meta">${p.hora} · ${p.cliente}</div>
            </div>
            <span class="badge ${statusCal[p.status]||'badge-gr'}">${p.status}</span>
            <span class="badge" style="background:rgba(0,0,0,.2);color:${canalColor[p.canal]||'var(--gr3)'};border:1px solid ${canalColor[p.canal]||'var(--gr3)'}33">${p.canal}</span>
          </div>`).join('')}
        </div>
      </div>`).join('')}
    </div>
    <div>
      <div class="card">
        <div class="card-hd"><h3>Resumo por Canal</h3></div>
        <div class="prog-wrap">
          ${Object.keys(canalColor).map(c=>{
            const cnt = D.calendario.filter(p=>p.canal===c).length;
            const pct = Math.round(cnt/D.calendario.length*100);
            return `<div class="prog-item">
              <div class="prog-top"><span>${c}</span><span class="text-wh fw-6">${cnt} posts</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${canalColor[c]}"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="card mt-3">
        <div class="card-hd"><h3>Status dos Posts</h3></div>
        <div class="flex gap-3" style="flex-direction:column">
          ${[['Agendado','ok'],['Revisão','wr'],['Rascunho','gr']].map(([s,c])=>`
          <div class="flex items-center gap-2" style="justify-content:space-between">
            <span class="badge badge-${c}">${s}</span>
            <span class="fw-7 text-wh">${D.calendario.filter(p=>p.status===s).length}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

  </div>
  <div class="prop-grid">
    ${D.propostas.map(p=>`<div class="prop-card">
      <div class="prop-hd">
        <div>
          <div class="prop-client">${p.cliente}</div>
          <div class="prop-date">Enviada: ${fmtDate(p.data)} · Válida até: ${fmtDate(p.validade)}</div>

      <div class="prop-val">R$ ${p.valor.toLocaleString('pt-BR')}${p.desconto>0?` <span style="font-size:13px;color:var(--gr3);text-decoration:line-through">+${p.desconto}% desc.</span>`:''}</div>

    </div>`).join('')}

}

function openModal(page) {
  const cfg = modalForms[page];
  if(!cfg) return;
  currentModal = page;
  document.getElementById('modal-title').textContent = cfg.title;
  document.getElementById('modal-body').innerHTML = cfg.fields;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentModal = null;
}

function closeModalOnOverlay(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveModal() {
  if(!currentModal) return;
  const cfg = modalForms[currentModal];
  if(cfg && cfg.save) {
    try { cfg.save(); } catch(e) { console.error(e); return; }
    closeModal();
    render();
  }
}

// Edit cliente modal
function editCliente(id) {
  const c = D.clientes.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modal-title').textContent = 'Editar Cliente';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row"><label class="form-label">Nome da Empresa</label><input class="inp" id="f-nome" value="${c.nome}"></div>
    <div class="form-row"><label class="form-label">Email de Contato</label><input class="inp" id="f-contato" type="email" value="${c.contato}"></div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">Setor</label><input class="inp" id="f-setor" value="${c.setor}"></div>
      <div class="form-row"><label class="form-label">Mensalidade (R$)</label><input class="inp" id="f-mensalidade" type="number" value="${c.mensalidade}"></div>
    </div>
    <div class="form-row"><label class="form-label">Status</label><select class="inp" id="f-status">
      <option ${c.status==='Ativo'?'selected':''}>Ativo</option>
      <option ${c.status==='Pausado'?'selected':''}>Pausado</option>
      <option ${c.status==='Inativo'?'selected':''}>Inativo</option>
    </select></div>
    <div class="form-row"><label class="form-label">Serviços</label><input class="inp" id="f-servicos" value="${c.servicos.join(', ')}"></div>`;
  currentModal = null;
  document.getElementById('modal-save').onclick = () => {
    c.nome = document.getElementById('f-nome').value.trim()||c.nome;
    c.contato = document.getElementById('f-contato').value.trim();
    c.setor = document.getElementById('f-setor').value;
    c.mensalidade = parseFloat(document.getElementById('f-mensalidade').value)||c.mensalidade;
    c.status = document.getElementById('f-status').value;
    c.servicos = document.getElementById('f-servicos').value.split(',').map(s=>s.trim()).filter(Boolean);
    closeModal();
    render();
  };
  document.getElementById('modal-overlay').classList.add('open');
}

function bindEvents() {
  // Re-attach modal save for regular modals
  if(currentModal) {
    document.getElementById('modal-save').onclick = saveModal;
  }
}

function statusBadge(s) {
  const m = {Ativo:'badge-ok',Pausado:'badge-wr',Inativo:'badge-er'};
  return `<span class="badge ${m[s]||'badge-gr'}">${s}</span>`;
}
function statusProj(s) {
  const m = {Planejamento:'badge-gr','Em Andamento':'badge-bl',Revisão:'badge-wr',Concluído:'badge-ok'};
  return `<span class="badge ${m[s]||'badge-gr'}">${s}</span>`;
}
function statusCamp(s) {
  const m = {Ativa:'badge-ok',Pausada:'badge-wr',Encerrada:'badge-er'};
  return `<span class="badge ${m[s]||'badge-gr'}">${s}</span>`;
}
function canalBadge(c) {
  const m = {'Google ADS':'badge-bl','Meta ADS':'badge-pu','LinkedIn ADS':'badge-al','TikTok ADS':'badge-er',Email:'badge-ok',SEO:'badge-wr'};
  return `<span class="badge ${m[c]||'badge-gr'}">${c}</span>`;
}
function prioridadeBadge(p) {
  const m = {Alta:'badge-er',Média:'badge-wr',Normal:'badge-al',Baixa:'badge-gr'};
  return `<span class="badge ${m[p]||'badge-gr'}">${p}</span>`;
}
function nivelBadge(n) {
  const m = {Sênior:'badge-al',Pleno:'badge-bl',Júnior:'badge-gr'};
  return m[n]||'badge-gr';
}
function initials(name) {
  return name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
}
function fmtDate(d) {
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtDateFull(d) {
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dt = new Date(d+'T12:00:00');
  return `${days[dt.getDay()]}, ${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
}
